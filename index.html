 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters 2026 | Live Sweepstakes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --masters-green: #004b23; --masters-yellow: #f6c444; --masters-red: #d91e18; }
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .masters-header { background: linear-gradient(to bottom, #004b23, #003a1b); border-bottom: 4px solid var(--masters-yellow); }
        .under-par { color: var(--masters-red); font-weight: 700; }
        .table-container { background: #161b22; border: 1px solid #30363d; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-5xl mx-auto">
        <header class="masters-header rounded-t-xl p-6 text-center shadow-2xl">
            <h1 class="text-3xl md:text-5xl font-serif text-[#f6c444] tracking-tight">The Masters</h1>
            <p class="text-white text-xs uppercase tracking-[0.3em] mt-2 font-semibold opacity-90">2026 Sweepstakes Leaderboard</p>
        </header>

        <div class="grid grid-cols-2 gap-px bg-[#30363d] border-x border-[#30363d]">
            <div class="bg-[#161b22] p-3 text-center">
                <p class="text-[9px] text-gray-400 uppercase tracking-widest">Status</p>
                <p class="text-green-400 text-xs font-bold flex items-center justify-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full pulse"></span> Live Scores
                </p>
            </div>
            <div class="bg-[#161b22] p-3 text-center border-l border-[#30363d]">
                <p class="text-[9px] text-gray-400 uppercase tracking-widest">Last Updated</p>
                <p id="time-display" class="text-white text-xs font-bold">--:--</p>
            </div>
        </div>

        <div class="table-container rounded-b-xl shadow-2xl overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="bg-[#0d1117] text-gray-400 uppercase text-[10px] tracking-widest border-b border-[#30363d]">
                        <th class="px-4 py-4 w-12 text-center">Pos</th>
                        <th class="px-4 py-4">Participant</th>
                        <th class="px-4 py-4 text-center bg-[#1c2128]">Total</th>
                        <th class="px-4 py-4">Golfer 1</th>
                        <th class="px-4 py-4">Golfer 2</th>
                        <th class="px-4 py-4">Golfer 3</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-data" class="divide-y divide-[#30363d]">
                    </tbody>
            </table>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-gray-600 text-[9px] mt-1 italic">Note: Score updates may have a 5-minute delay from source.</p>
        </footer>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=950728203&single=true&output=csv';

        // Helper to parse CSV properly (handling commas in names if any)
        function parseCSV(text) {
            const rows = [];
            const lines = text.split('\n');
            for (let line of lines) {
                if (line.trim() === "") continue;
                // Simple split; use a regex if names contain commas
                rows.push(line.split(','));
            }
            return rows;
        }

        async function updateLeaderboard() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                const tbody = document.getElementById('leaderboard-data');
                tbody.innerHTML = '';

                // Header is at row 0, data starts at row 1
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (row.length < 9) continue;

                    const [rank, participant, total, g1, s1, g2, s2, g3, s3] = row;
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-[#1c2128] transition-colors";
                    
                    // Determine if the total score is under par
                    const isUnderPar = total.trim().startsWith('-');
                    const scoreDisplay = total.trim() === "0" ? "E" : total;
                    
                    tr.innerHTML = `
                        <td class="px-4 py-5 text-center font-bold text-gray-500 text-sm">${rank}</td>
                        <td class="px-4 py-5 font-bold text-gray-100">${participant}</td>
                        <td class="px-4 py-5 text-center bg-[#1c2128]">
                            <span class="${isUnderPar ? 'under-par' : 'text-white'} text-xl">${scoreDisplay}</span>
                        </td>
                        <td class="px-4 py-5 text-[11px] text-gray-400">
                            <div class="font-semibold text-gray-300">${g1}</div>
                            <div class="${s1.includes('-') ? 'text-red-500' : 'text-gray-500'}">${s1}</div>
                        </td>
                        <td class="px-4 py-5 text-[11px] text-gray-400">
                            <div class="font-semibold text-gray-300">${g2}</div>
                            <div class="${s2.includes('-') ? 'text-red-500' : 'text-gray-500'}">${s2}</div>
                        </td>
                        <td class="px-4 py-5 text-[11px] text-gray-400">
                            <div class="font-semibold text-gray-300">${g3}</div>
                            <div class="${s3.includes('-') ? 'text-red-500' : 'text-gray-500'}">${s3}</div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
                
                document.getElementById('time-display').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } catch (e) {
                console.error("Error updating leaderboard:", e);
            }
        }

        updateLeaderboard();
        setInterval(updateLeaderboard, 60000); // Auto-refresh every 60 seconds
    </script>
</body>
</html>
