<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters 2026 | Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --masters-green: #004b23; --masters-yellow: #f6c444; --masters-red: #d91e18; }
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .masters-header { background: linear-gradient(to bottom, #004b23, #003a1b); border-bottom: 4px solid var(--masters-yellow); }
        .nav-link { color: #8b949e; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .nav-active { color: var(--masters-yellow) !important; border-bottom: 2px solid var(--masters-yellow) !important; }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-5xl mx-auto">
        <header class="masters-header rounded-t-xl p-6 text-center shadow-2xl">
            <h1 class="text-3xl md:text-5xl font-serif text-[#f6c444]">The Masters</h1>
            <p class="text-white text-[10px] uppercase tracking-[0.3em] mt-2 font-semibold">2026 Sweepstakes Standings</p>
        </header>

        <nav class="bg-[#161b22] border-x border-[#30363d] flex justify-center space-x-4 md:space-x-8 py-3 sticky top-0 z-50">
            <a href="index.html" class="nav-link nav-active px-3 py-1 text-xs font-bold uppercase tracking-widest">Standings</a>
            <a href="stats.html" class="nav-link px-3 py-1 text-xs font-bold uppercase tracking-widest hover:text-[#f6c444]">Stats</a>
            <a href="cut.html" class="nav-link px-3 py-1 text-xs font-bold uppercase tracking-widest hover:text-[#f6c444]">Cut Line</a>
        </nav>

        <div class="bg-[#161b22] border border-[#30363d] rounded-b-xl shadow-2xl overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="bg-[#0d1117] text-gray-400 uppercase text-[10px] tracking-widest border-b border-[#30363d]">
                        <th class="px-4 py-4 w-12 text-center">Pos</th>
                        <th class="px-4 py-4">Participant</th>
                        <th class="px-4 py-4 text-center bg-[#1c2128]">Total</th>
                        <th class="px-4 py-4">Golfer 1</th>
                        <th class="px-4 py-4">Golfer 2</th>
                        <th class="px-4 py-4">Golfer 3</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-data" class="divide-y divide-[#30363d]"></tbody>
            </table>
        </div>
    </div>


    <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=950728203&single=true&output=csv';

    async function update() {
        try {
            const response = await fetch(csvUrl + '&cb=' + Date.now());
            const buffer = await response.arrayBuffer();
            const decoder = new TextDecoder('utf-8');
            const csvText = decoder.decode(buffer);
            
            const rows = csvText.split(/\r?\n/).map(row => row.split(',').map(cell => cell.trim()));
            const tbody = document.getElementById('leaderboard-data');
            tbody.innerHTML = '';

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 10 || !row[1]) continue;

                const [rank, name, total, g1, s1, g2, s2, g3, s3, status] = row;
                const isDQ = status && (status.includes("❌") || status.includes("CUT") || status.includes("‚"));
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-[#1c2128] transition-colors border-b border-[#30363d]";
                
                const safeTotal = String(total || "");
                const isUnder = safeTotal.startsWith('-');
                let displayTotal = (safeTotal === '0' && s1.includes('.')) ? "..." : (safeTotal === '0' ? 'E' : safeTotal);
                if (isDQ) displayTotal = 'CUT';

                tr.innerHTML = `
                    <td class="px-4 py-5 text-center font-bold text-gray-500 text-sm">${rank}</td>
                    <td class="px-4 py-5 font-bold ${isDQ ? 'text-gray-500 line-through italic' : 'text-gray-100'}">
                        ${name} ${isDQ ? '<span class="ml-2 text-[10px] bg-red-900 text-red-200 px-2 py-0.5 rounded-full font-black uppercase">DQ</span>' : ''}
                    </td>
                    <td class="px-4 py-5 text-center bg-[#1c2128]">
                        <span class="${isUnder ? 'text-red-500' : 'text-white'} text-xl font-bold">${displayTotal}</span>
                    </td>
                    <td class="px-4 py-5 text-[11px] text-gray-400 font-semibold">
                        <div class="text-gray-200 font-bold mb-1">${g1}</div>
                        <div class="${(s1||"").includes('-') ? 'text-red-500' : 'text-gray-500'}">${s1.includes('.') ? '...' : s1}</div>
                    </td>
                    <td class="px-4 py-5 text-[11px] text-gray-400 font-semibold">
                        <div class="text-gray-200 font-bold mb-1">${g2}</div>
                        <div class="${(s2||"").includes('-') ? 'text-red-500' : 'text-gray-500'}">${s2.includes('.') ? '...' : s2}</div>
                    </td>
                    <td class="px-4 py-5 text-[11px] text-gray-400 font-semibold">
                        <div class="text-gray-200 font-bold mb-1">${g3}</div>
                        <div class="${(s3||"").includes('-') ? 'text-red-500' : 'text-gray-500'}">${s3.includes('.') ? '...' : s3}</div>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        } catch (e) { console.error(e); }
    }
    update();
    setInterval(update, 60000);
</script>
</body>
</html>
