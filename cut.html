<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters 2026 | Cut Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --masters-green: #004b23; --masters-yellow: #f6c444; --masters-red: #d91e18; }
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .masters-header { background: linear-gradient(to bottom, #004b23, #003a1b); border-bottom: 4px solid var(--masters-yellow); }
        .nav-link { color: #8b949e; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .nav-active { color: var(--masters-yellow) !important; border-bottom: 2px solid var(--masters-yellow) !important; }
        .card-safe { border-left: 4px solid #10b981; background: #1a222c; }
        .card-bubble { border-left: 4px solid #f6c444; background: #1c1f26; }
        .card-cut { border-left: 4px solid #ef4444; opacity: 0.6; background: #161b22; }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-4xl mx-auto">
        <header class="masters-header rounded-t-xl p-6 text-center shadow-2xl">
            <h1 class="text-3xl md:text-5xl font-serif text-[#f6c444]">The Masters</h1>
            <p class="text-white text-[10px] uppercase tracking-[0.3em] mt-2 font-semibold italic">Live Cut Line Tracker</p>
        </header>

        <nav class="bg-[#161b22] border-x border-[#30363d] flex justify-center space-x-6 py-3 sticky top-0 z-50">
            <a href="index.html" class="nav-link px-3 py-1 text-xs font-bold uppercase tracking-widest hover:text-white">Standings</a>
            <a href="stats.html" class="nav-link px-3 py-1 text-xs font-bold uppercase tracking-widest hover:text-white">Stats</a>
            <a href="cut.html" class="nav-link nav-active px-3 py-1 text-xs font-bold uppercase tracking-widest">Cut Line</a>
        </nav>

        <div id="cut-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-6">
            <p class="col-span-full text-center text-gray-500 py-10 italic">Loading cut data...</p>
        </div>
    </div>

    <script>
        const cutUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=103685137&single=true&output=csv';

        async function update() {
            try {
                const response = await fetch(cutUrl + '&cb=' + new Date().getTime());
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                const container = document.getElementById('cut-list');
                container.innerHTML = '';

                lines.slice(1).forEach(line => {
                    const cols = line.split(',').map(c => c.trim());
                    if (cols.length < 5 || !cols[0]) return;
                    const [name, score, toCut, isCut, today] = cols;
                    
                    const toCutNum = parseInt(toCut);
                    let cardClass = 'card-safe';
                    // Bubble is within 1 shot of the cut line
                    if (toCutNum >= -1 && toCutNum <= 1) cardClass = 'card-bubble';
                    // Cut is anyone ESPN marked as 'Yes' or if they are logically cut
                    if (isCut.toLowerCase() === 'yes' || isCut.includes('❌')) cardClass = 'card-cut';

                    const card = document.createElement('div');
                    card.className = `p-4 rounded shadow-lg flex justify-between items-center ${cardClass}`;
                    
                    const scoreDisplay = (score === '0' || score === 'E') ? 'E' : (score > 0 ? '+' + score : score);
                    const toCutDisplay = isCut.toLowerCase() === 'yes' ? '❌ MISSED CUT' : (toCutNum <= 0 ? Math.abs(toCutNum) + " Clear" : toCutNum + " Back");

                    card.innerHTML = `
                        <div>
                            <p class="text-white font-bold">${name}</p>
                            <p class="text-[10px] text-gray-400 uppercase tracking-tighter">${toCutDisplay}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-serif ${score.includes('-') ? 'text-red-500' : 'text-white'}">${scoreDisplay}</p>
                            <p class="text-[10px] text-gray-500">Today: ${today}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }
        update();
        setInterval(update, 60000);
    </script>
</body>
</html>
