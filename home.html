<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters 2026 | Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --masters-green: #004b23; 
            --masters-yellow: #f6c444; 
            --masters-bg: #f9fafb;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--masters-bg); color: #111827; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .masters-header { 
            background: linear-gradient(135deg, #004b23 0%, #003a1b 100%); 
            border-bottom: 4px solid var(--masters-yellow);
        }
        .nav-link { color: #6b7280; font-weight: 600; transition: all 0.2s; }
        .nav-active { color: var(--masters-green) !important; border-bottom: 2px solid var(--masters-green) !important; }
        .leaderboard-container { background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .row-dq { background-color: #fcfcfc; opacity: 0.5; }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-6xl mx-auto">
        <header class="masters-header rounded-t-xl p-8 text-center shadow-lg">
            <h1 class="text-4xl md:text-6xl font-serif text-[#f6c444] mb-2 tracking-tight">The Masters</h1>
            <p class="text-white text-[10px] uppercase tracking-[0.5em] font-bold opacity-80">2026 Sweepstakes Standings</p>
        </header>


        <nav class="bg-white border-x border-gray-200 flex justify-center space-x-4 md:space-x-8 py-4 sticky top-0 z-50 shadow-sm overflow-x-auto whitespace-nowrap px-4">
            <a href="home.html" id="nav-standings" class="nav-link nav-active px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Standings</a>
            <a href="masters_stats.html" id="nav-stats" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Stats</a>
            <a href="masters_cut.html" id="nav-cut" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Cut Line</a>
            <a href="live_line.html" id="nav-line" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">On the Line</a>
        </nav>

        <div class="leaderboard-container overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="bg-[#004b23] text-white uppercase text-[10px] tracking-[0.2em]">
                            <th class="px-6 py-4 w-16 text-center">Pos</th>
                            <th class="px-6 py-4">Participant</th>
                            <th class="px-6 py-4 text-center bg-[#003a1b]">Total</th>
                            <th class="px-6 py-4">Golfer 1</th>
                            <th class="px-6 py-4">Golfer 2</th>
                            <th class="px-6 py-4">Golfer 3</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-data" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
        
        <div class="mt-6 flex justify-between items-center px-4">
            <div id="debug-status" class="text-[9px] text-gray-400 font-mono uppercase">System Active</div>
            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                Last Live Update: <span id="last-update" class="text-green-700 font-mono">Connecting...</span>
            </div>
        </div>
    </div>


    <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=950728203&single=true&output=csv';

    async function update() {
        try {
            const response = await fetch(csvUrl + '&cb=' + Date.now());
            const buffer = await response.arrayBuffer();
            const csvText = new TextDecoder('utf-8').decode(buffer);
            
            const rows = csvText.split(/\r?\n/).map(row => row.split(',').map(cell => cell.trim()));
            
            if (rows.length < 2) return;

            // 🛡️ THE SHIELD: Check if Google served a broken/blank sheet
            const checkTotal = rows[1][2]; // Look at the first player's total
            if (!checkTotal || checkTotal.includes('#') || checkTotal === '...') {
                document.getElementById('debug-status').innerText = "Awaiting Valid Data...";
                setTimeout(update, 3000); // Silently retry in 3 seconds
                return; // ABORT update to protect the screen
            }

            const tbody = document.getElementById('leaderboard-data');
            let newHTML = ''; // Build off-screen to prevent flickering

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 9 || !row[1]) continue;

                try {
                    const [rank, name, total, g1, s1, g2, s2, g3, s3, status] = row;
                    const isDQ = status && (status.includes("❌") || status.includes("CUT") || status.includes("‚"));
                    
                    const safeTotal = String(total || "");
                    const isUnder = safeTotal.startsWith('-');
                    
                    let displayTotal = isDQ ? 'CUT' : (safeTotal === '0' && (s1||"").includes('.') ? "..." : (safeTotal === '0' ? 'E' : safeTotal));
                    let scoreColor = isDQ ? 'text-gray-400' : (isUnder ? 'text-red-600' : 'text-gray-900');

                    newHTML += `
                        <tr class="transition-colors ${isDQ ? 'row-dq' : 'hover:bg-gray-50'}">
                            <td class="px-6 py-6 text-center font-bold text-gray-400 text-sm">${isDQ ? '—' : rank}</td>
                            <td class="px-6 py-6">
                                <div class="font-serif text-lg font-bold text-gray-900 ${isDQ ? 'line-through italic opacity-50' : ''}">${name}</div>
                                <div class="flex items-center mt-1">
                                    <span class="text-[8px] font-black uppercase px-1.5 py-0.5 rounded border ${isDQ ? 'border-red-200 text-red-400' : 'border-green-200 text-green-600'}">
                                        ${isDQ ? 'Out' : 'Active'}
                                    </span>
                                </div>
                            </td>
                            <td class="px-6 py-6 text-center bg-gray-50/30">
                                <span class="${scoreColor} text-2xl font-serif font-bold">${displayTotal}</span>
                            </td>
                            ${[ [g1,s1], [g2,s2], [g3,s3] ].map(([g, s]) => `
                                <td class="px-6 py-6 text-[11px]">
                                    <div class="text-gray-900 font-bold mb-0.5 whitespace-nowrap">${g || ''}</div>
                                    <div class="font-serif font-bold ${(s||"").includes('-') ? 'text-red-600' : 'text-gray-400'}">
                                        ${(s||"").includes('.') ? '...' : (s || '')}
                                    </div>
                                </td>
                            `).join('')}
                        </tr>
                    `;
                } catch (rowError) { console.error(rowError); }
            }
            
            tbody.innerHTML = newHTML; // Only push to screen if everything succeeds
            document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            document.getElementById('debug-status').innerText = "Live: OK";
            
        } catch (e) { 
            console.error("Main Update Error:", e);
            document.getElementById('debug-status').innerText = "Network Error - Retrying...";
            setTimeout(update, 5000);
        }
    }

    update();
    setInterval(update, 60000);
    </script>
</body>
</html>
