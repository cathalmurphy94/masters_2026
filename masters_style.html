<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Masters | Tournament Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f7f7; color: #333; }
        .masters-green { background-color: #004b23; }
        .masters-gold { background-color: #f6c444; }
        .text-masters-red { color: #d91e18; font-weight: bold; }
        .text-masters-green { color: #004b23; font-weight: bold; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .leaderboard-row:nth-child(even) { background-color: #fdfdfd; }
        .leaderboard-row:hover { background-color: #f0f4f1; }
    </style>
</head>
<body>

    <div class="masters-green h-2 w-full"></div>
    <header class="bg-white border-b border-gray-200 py-6 px-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-serif masters-green-text italic">The Masters</h1>
            <div class="text-right">
                <p class="text-[10px] uppercase tracking-tighter text-gray-400">Round 4 - Final Standings</p>
                <p class="text-xs font-bold text-[#004b23]">AUGUSTA NATIONAL</p>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto mt-8 px-2">
        <div class="bg-white rounded shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-gray-50 text-[10px] uppercase text-gray-500 border-b border-gray-200">
                        <th class="px-4 py-3 font-medium">Pos</th>
                        <th class="px-4 py-3 font-medium text-left">Participant</th>
                        <th class="px-4 py-3 font-medium text-center">To Par</th>
                        <th class="px-4 py-3 font-medium text-left hidden md:table-cell">The Team</th>
                    </tr>
                </thead>
                <tbody id="live-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=950728203&single=true&output=csv';

        async function load() {
            const resp = await fetch(csvUrl);
            const text = await resp.text();
            const rows = text.split('\n').slice(1);
            const tbody = document.getElementById('live-body');
            tbody.innerHTML = '';

            rows.forEach(row => {
                const cols = row.split(',');
                if(cols.length < 3) return;

                const isUnder = cols[2].startsWith('-');
                const isOver = cols[2].startsWith('+');
                const scoreClass = isUnder ? 'text-masters-red' : (isOver ? 'text-masters-green' : 'text-black');

                const tr = document.createElement('tr');
                tr.className = "leaderboard-row border-b border-gray-100 transition-colors";
                tr.innerHTML = `
                    <td class="px-4 py-4 text-center font-bold text-gray-400">${cols[0]}</td>
                    <td class="px-4 py-4 font-bold text-[#004b23]">${cols[1]}</td>
                    <td class="px-4 py-4 text-center text-lg ${scoreClass}">${cols[2]}</td>
                    <td class="px-4 py-4 text-[11px] text-gray-500 hidden md:table-cell">
                        ${cols[3]} (${cols[4]}) • ${cols[5]} (${cols[6]}) • ${cols[7]} (${cols[8]})
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
        load();
        setInterval(load, 60000);
    </script>
</body>
</html>
