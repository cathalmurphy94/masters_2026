<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters 2026 | On the Line</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --masters-green: #004b23; --masters-yellow: #f6c444; --masters-bg: #f9fafb; }
        body { font-family: 'Inter', sans-serif; background-color: var(--masters-bg); color: #111827; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .masters-header { background: linear-gradient(135deg, #004b23 0%, #003a1b 100%); border-bottom: 4px solid var(--masters-yellow); }
        .nav-link { color: #6b7280; font-weight: 600; transition: all 0.2s; }
        .nav-active { color: var(--masters-green) !important; border-bottom: 2px solid var(--masters-green) !important; }
        
        .line-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .golfer-box { transition: all 0.3s ease; }
        .pulse-slow { animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-5xl mx-auto">
        <header class="masters-header rounded-t-xl p-8 text-center shadow-lg">
            <h1 class="text-4xl md:text-6xl font-serif text-[#f6c444] mb-2 tracking-tight">The Masters</h1>
            <p class="text-white text-[10px] uppercase tracking-[0.5em] font-bold opacity-80 italic">On the Line: Those in danger of being cut</p>
        </header>

        <nav class="bg-white border-x border-gray-200 flex justify-center space-x-4 md:space-x-8 py-4 sticky top-0 z-50 shadow-sm overflow-x-auto whitespace-nowrap px-4">
            <a href="masters_style2.html" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Standings</a>
            <a href="masters_stats.html" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Stats</a>
            <a href="masters_cut.html" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Cut Line</a>
            <a href="live_line.html" class="nav-link nav-active px-3 py-1 text-[10px] uppercase tracking-widest">On the Line</a>
        </nav>

        <div class="bg-white border-x border-b border-gray-100 p-6 text-center shadow-sm">
            <p class="text-[10px] text-gray-400 font-black uppercase tracking-[0.3em] mb-1">Projected Cut Line</p>
            <div id="cut-display" class="text-4xl font-serif font-bold text-green-900">...</div>
        </div>

        <div id="on-the-line-list" class="grid grid-cols-1 gap-6 mt-8 pb-12">
            <p class="text-center text-gray-400 py-20 italic font-serif">Syncing live scores...</p>
        </div>
    </div>

    <script>
        const boardUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=950728203&single=true&output=csv';
        const cutUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=103685137&single=true&output=csv';

        async function update() {
            try {
                // 1. Get Cut Data
                const cutRes = await fetch(cutUrl + '&cb=' + Date.now());
                const cutTxt = await cutRes.text();
                const cutRows = cutTxt.split('\n').slice(1);
                
                let golferStatus = {}; 
                let projCut = "E";

                if (cutRows.length > 0) {
                    const first = cutRows[0].split(',');
                    const rawLine = parseInt(first[1]) - parseInt(first[2]);
                    projCut = rawLine > 0 ? '+' + rawLine : (rawLine === 0 ? 'E' : rawLine);
                    document.getElementById('cut-display').innerText = projCut;
                }

                cutRows.forEach(line => {
                    const c = line.split(',').map(x => x.trim());
                    if (c.length < 3) return;
                    const toCut = parseInt(c[2]);
                    const isCut = c[3].toLowerCase().includes('yes') || c[3].includes('❌');
                    
                    let type = 'SAFE';
                    if (!isCut) {
                        if (toCut > 0) type = 'OVER';
                        else if (toCut >= -3) type = 'DANGER';
                    } else {
                        type = 'CUT';
                    }
                    
                    golferStatus[c[0]] = { type, toCut, score: c[1] };
                });

                // 2. Get Participants
                const boardRes = await fetch(boardUrl + '&cb=' + Date.now());
                const boardTxt = await boardRes.text();
                const boardRows = boardTxt.split('\n').slice(1);
                
                const container = document.getElementById('on-the-line-list');
                container.innerHTML = '';
                let matchCount = 0;

                boardRows.forEach(line => {
                    const r = line.split(',').map(x => x.trim());
                    if (r.length < 10 || r[9].includes('❌')) return;

                    const team = [
                        { name: r[3], stats: golferStatus[r[3]] },
                        { name: r[5], stats: golferStatus[r[5]] },
                        { name: r[7], stats: golferStatus[r[7]] }
                    ];

                    // Criteria to appear: At least one golfer is DANGER or OVER
                    const isThreatened = team.some(g => g.stats && (g.stats.type === 'DANGER' || g.stats.type === 'OVER'));

                    if (isThreatened) {
                        matchCount++;
                        const card = document.createElement('div');
                        card.className = "line-card overflow-hidden border border-gray-100 shadow-sm flex flex-col md:flex-row";
                        
                        let golfersHtml = team.map(g => {
                            const s = g.stats || { type: 'SAFE', toCut: -99, score: '...' };
                            let colorClasses = "bg-gray-50 border-gray-100 text-gray-400 opacity-40"; // Default Safe
                            let label = "Safe";
                            
                            if (s.type === 'DANGER') {
                                colorClasses = "bg-amber-50 border-amber-200 text-amber-800 ring-2 ring-amber-100 ring-offset-1 pulse-slow";
                                label = s.toCut === 0 ? "ON LINE" : Math.abs(s.toCut) + " CLEAR";
                            } else if (s.type === 'OVER') {
                                colorClasses = "bg-red-50 border-red-200 text-red-800 ring-2 ring-red-100 ring-offset-1";
                                label = s.toCut + " BACK";
                            }

                            return `
                                <div class="flex-1 p-4 border-l first:border-l-0 ${colorClasses} golfer-box">
                                    <p class="text-[9px] font-black uppercase tracking-tighter mb-1">${label}</p>
                                    <p class="text-xs font-bold truncate">${g.name}</p>
                                    <p class="text-xl font-serif font-bold">${s.score}</p>
                                </div>
                            `;
                        }).join('');

                        card.innerHTML = `
                            <div class="p-6 md:w-1/3 bg-white flex flex-col justify-center">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Position: ${r[0]}</span>
                                <h3 class="font-serif text-2xl font-bold text-gray-900">${r[1]}</h3>
                            </div>
                            <div class="flex flex-col md:flex-row md:w-2/3 border-t md:border-t-0 md:border-l border-gray-100">
                                ${golfersHtml}
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });

                if (matchCount === 0) {
                    container.innerHTML = `
                        <div class="text-center py-20 bg-white rounded-xl border border-dashed border-gray-200">
                            <p class="text-3xl mb-2">⛳</p>
                            <p class="text-gray-500 font-serif italic">The field has settled. No active participants are currently on the bubble.</p>
                        </div>`;
                }

            } catch (e) { console.error(e); }
        }
        update();
        setInterval(update, 60000);
    </script>
</body>
</html>
