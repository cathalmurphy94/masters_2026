<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters 2026 | On the Line</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --masters-green: #004b23; --masters-yellow: #f6c444; --masters-bg: #f9fafb; }
        body { font-family: 'Inter', sans-serif; background-color: var(--masters-bg); color: #111827; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .masters-header { background: linear-gradient(135deg, #004b23 0%, #003a1b 100%); border-bottom: 4px solid var(--masters-yellow); }
        .nav-link { color: #6b7280; font-weight: 600; transition: all 0.2s; }
        .nav-active { color: var(--masters-green) !important; border-bottom: 2px solid var(--masters-green) !important; }
        
        .line-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .pulse-amber { animation: pulseAmber 2s infinite; }
        .pulse-red { animation: pulseRed 1.5s infinite; }
        @keyframes pulseAmber { 0%, 100% { background-color: #fffbeb; } 50% { background-color: #fef3c7; } }
        @keyframes pulseRed { 0%, 100% { background-color: #fef2f2; } 50% { background-color: #fee2e2; } }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-5xl mx-auto">
        <header class="masters-header rounded-t-xl p-8 text-center shadow-lg">
            <h1 class="text-4xl md:text-6xl font-serif text-[#f6c444] mb-2 tracking-tight">The Masters</h1>
            <p class="text-white text-[10px] uppercase tracking-[0.5em] font-bold opacity-80 italic">On the Line: Danger of being cut!</p>
        </header>

        <nav class="bg-white border-x border-gray-200 flex justify-center space-x-4 md:space-x-8 py-4 sticky top-0 z-50 shadow-sm overflow-x-auto whitespace-nowrap px-4">
            <a href="home.html" id="nav-standings" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Standings</a>
            <a href="masters_cut.html" id="nav-cut" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Cut Line</a>
            <a href="live_line.html" id="nav-line" class="nav-link nav-active px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">On the Line</a>
            <a href="not_so_good.html" class="nav-link px-3 py-1 text-[10px] uppercase tracking-widest hover:text-[#004b23]">Not So Good</a>
        </nav>

        <div class="bg-white border-x border-b border-gray-100 p-6 text-center shadow-sm">
            <p class="text-[10px] text-gray-400 font-black uppercase tracking-[0.3em] mb-1">Projected Cut Line</p>
            <div id="cut-display" class="text-5xl font-serif font-bold text-green-900">...</div>
        </div>

        <div id="on-the-line-list" class="grid grid-cols-1 gap-6 mt-8 pb-12">
            <p class="text-center text-gray-400 py-20 italic font-serif">Syncing live scores...</p>
        </div>
    </div>


    <script>
        const boardUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=950728203&single=true&output=csv';
        const cutUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHQDG5CJQT_UeE-FfUr4yx696O2kaUwDm1Iod76aC3gyGi9x8agvjZqikW3TP0btaCZCk5i8rszdK/pub?gid=103685137&single=true&output=csv';

        async function update() {
            try {
                const cutRes = await fetch(cutUrl + '&cb=' + Date.now());
                const cutTxt = await cutRes.text();
                const cutRows = cutTxt.split('\n').slice(1);
                
                // 🛡️ SHIELD: Check Cut Line data
                if (cutRows.length > 0) {
                    const firstCut = cutRows[0].split(',');
                    if (!firstCut[1] || firstCut[1].includes('#')) {
                        setTimeout(update, 3000); return;
                    }
                    const rawLine = parseInt(firstCut[1]) - parseInt(firstCut[2]);
                    document.getElementById('cut-display').innerText = rawLine > 0 ? '+' + rawLine : (rawLine === 0 ? 'E' : rawLine);
                }

                let golferStatus = {}; 
                cutRows.forEach(line => {
                    const c = line.split(',').map(x => x.trim());
                    if (c.length < 3) return;
                    const toCut = parseInt(c[2]);
                    const isCut = c[3].toLowerCase().includes('yes') || c[3].includes('❌');
                    let type = 'SAFE';
                    if (!isCut) {
                        if (toCut > 0) type = 'OVER';
                        else if (toCut >= -3) type = 'DANGER';
                    } else { type = 'CUT'; }
                    golferStatus[c[0]] = { type, toCut, score: c[1] };
                });

                const boardRes = await fetch(boardUrl + '&cb=' + Date.now());
                const boardTxt = await boardRes.text();
                const boardRows = boardTxt.split('\n').slice(1);
                
                // 🛡️ SHIELD: Check Standings data
                if (boardRows.length > 0) {
                    const firstBoard = boardRows[0].split(',');
                    if (!firstBoard[2] || firstBoard[2].includes('#') || firstBoard[2] === '...') {
                        setTimeout(update, 3000); return; 
                    }
                }

                let newHTML = '';
                let matchCount = 0;

                boardRows.forEach(line => {
                    const r = line.split(',').map(x => x.trim());
                    if (r.length < 10 || r[9].includes('❌')) return;

                    const team = [
                        { name: r[3], stats: golferStatus[r[3]] },
                        { name: r[5], stats: golferStatus[r[5]] },
                        { name: r[7], stats: golferStatus[r[7]] }
                    ];

                    const atRisk = team.filter(g => g.stats && (g.stats.type === 'DANGER' || g.stats.type === 'OVER'));

                    if (atRisk.length > 0) {
                        matchCount++;
                        let golfersHtml = team.map(g => {
                            const s = g.stats || { type: 'SAFE', toCut: -99, score: '...' };
                            let colorClasses = "bg-gray-50 text-gray-400 opacity-40";
                            let label = "Safe";
                            
                            if (s.type === 'DANGER') {
                                colorClasses = "pulse-amber border-amber-200 text-amber-800 ring-1 ring-amber-100";
                                label = s.toCut === 0 ? "ON THE LINE" : Math.abs(s.toCut) + " CLEAR";
                            } else if (s.type === 'OVER') {
                                colorClasses = "pulse-red border-red-200 text-red-800 ring-1 ring-red-100";
                                label = s.toCut + " BACK";
                            }
                            return `
                                <div class="flex-1 p-4 border-l first:border-l-0 border-gray-100 ${colorClasses}">
                                    <p class="text-[8px] font-black uppercase tracking-widest mb-1">${label}</p>
                                    <p class="text-[11px] font-bold truncate">${g.name}</p>
                                    <p class="text-xl font-serif font-bold">${s.score}</p>
                                </div>
                            `;
                        }).join('');

                        newHTML += `
                            <div class="line-card overflow-hidden border border-gray-100 shadow-sm flex flex-col md:flex-row mb-6">
                                <div class="p-6 md:w-1/3 bg-white">
                                    <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Current Pos: ${r[0]}</span>
                                    <h3 class="font-serif text-2xl font-bold text-gray-900 leading-tight">${r[1]}</h3>
                                    <div class="mt-2 text-[9px] font-bold text-orange-600 uppercase tracking-tighter">
                                        ⚠️ ${atRisk.length} Golfer${atRisk.length > 1 ? 's' : ''} at risk
                                    </div>
                                </div>
                                <div class="flex flex-col md:flex-row md:w-2/3 border-t md:border-t-0 md:border-l border-gray-100">
                                    ${golfersHtml}
                                </div>
                            </div>
                        `;
                    }
                });

                document.getElementById('on-the-line-list').innerHTML = matchCount === 0 ? 
                    `<div class="text-center py-20 bg-white rounded-xl border-2 border-dashed border-gray-200"><p class="text-4xl mb-4">🥂</p><p class="text-gray-500 font-serif text-lg italic px-4">If your name is not here, then you're safe.</p></div>` 
                    : newHTML;

            } catch (e) { 
                console.error(e); 
                setTimeout(update, 5000);
            }
        }
        update();
        setInterval(update, 60000);
    </script>
</body>
</html>
